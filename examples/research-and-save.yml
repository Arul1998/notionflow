name: Research and save to Notion
on:
  manual: true

steps:
  - id: research
    type: web_research
    query: "Latest developments in Model Context Protocol MCP and AI agents 2026"

  - id: summarise
    type: ai_transform
    prompt: |
      You are a technical research assistant. Take the following research results
      and create a well-structured knowledge base entry:

      {{steps.research.output}}

      Format your response as:
      # Summary
      2-3 sentence overview

      # Key Findings
      - Bullet points of the most important findings

      # Implications
      What this means for developers building with MCP

      # Sources to explore
      Any notable sources or links mentioned

      Keep it concise but insightful.

  - id: save_research
    type: notion_op
    action: create_page
    database: "{{env.STANDUPS_DB_ID}}"
    title: "Research: MCP & AI Agents {{date.today}}"
    content: "{{steps.summarise.output}}"
